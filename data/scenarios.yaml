# 18 scenarios: 3 specificity strata x 3 seasons x 2 prompt variants
# target_p* = curator fallback estimates; data/fawn_sync.json overrides when present
# Seasons: annual (Jan-Dec), wet_season (Jun-Sep), dry_season (Dec-Feb)

# ============ ANNUAL ============

# --- specific_station (FAWN 440 Homestead / Miami) ---
- id: miami_annual_natural
  stratum: specific_station
  season: annual
  prompt_variant: natural
  location_description: >-
    My grandma lives in Miami, Florida. How much rain should she expect over the next year?
  fawn_station_id: "440"
  target_p10: 45.0
  target_p50: 55.0
  target_p90: 70.0
  notes: Homestead FAWN station (Miami-Dade); annual anchor

- id: miami_annual_statistical
  stratum: specific_station
  season: annual
  prompt_variant: statistical
  location_description: >-
    A FAWN agricultural monitoring station in Miami-Dade County, Florida (Homestead, station 440).
  fawn_station_id: "440"
  target_p10: 45.0
  target_p50: 55.0
  target_p90: 70.0
  notes: Same ground truth as miami_annual_natural

# --- regional_inference (FAWN 480 North Port) ---
- id: gulf_city_annual_natural
  stratum: regional_inference
  season: annual
  prompt_variant: natural
  location_description: >-
    My grandma lives in a Gulf coast Florida city of about 100,000 people — not Miami or Tampa.
    How much rain should she expect over the next year?
  fawn_station_id: "480"
  target_p10: 42.0
  target_p50: 54.0
  target_p90: 68.0
  notes: North Port FAWN station (Sarasota County Gulf coast)

- id: gulf_city_annual_statistical
  stratum: regional_inference
  season: annual
  prompt_variant: statistical
  location_description: >-
    A Gulf coast Florida city with roughly 100,000 residents (North Port, FAWN station 480).
  fawn_station_id: "480"
  target_p10: 42.0
  target_p50: 54.0
  target_p90: 68.0
  notes: Same ground truth as gulf_city_annual_natural

# --- underspecified (pooled FAWN network) ---
- id: random_fl_annual_natural
  stratum: underspecified
  season: annual
  prompt_variant: natural
  location_description: >-
    My grandma lives somewhere in Florida — I do not know the city. How much rain should she
    expect over the next year?
  fawn_station_id: null
  target_p10: 38.0
  target_p50: 50.0
  target_p90: 68.0
  notes: Pooled across FAWN stations

- id: random_fl_annual_statistical
  stratum: underspecified
  season: annual
  prompt_variant: statistical
  location_description: >-
    A random Florida agricultural monitoring station drawn uniformly from the FAWN network
    (any of the ~50 stations statewide).
  fawn_station_id: null
  target_p10: 38.0
  target_p50: 50.0
  target_p90: 68.0
  notes: Cross-station pooled distribution

